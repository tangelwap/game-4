name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Get dependencies
      run: flutter pub get
      working-directory: ./game_4

    - name: Build APK
      run: flutter build apk --release --split-per-abi
      working-directory: ./game_4

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-release
        path: game_4/build/app/outputs/flutter-apk/app-release.apk
